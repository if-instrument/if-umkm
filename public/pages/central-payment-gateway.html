<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Gateway Master - IF Instrument</title>
    <link rel="stylesheet" href="../styles.css?v=1784794256" />
  </head>
  <body data-page="central-payment-gateway" data-title="Payment Gateway Master" data-eyebrow="SaaS Pusat">
    <template id="page-content">
      <section class="content-grid single">
        <div class="hero-summary-banner">
          <div class="hero-summary-copy">
            <span class="hero-kicker">SaaS Central Management</span>
            <h2>Master Payment Gateway Pusat</h2>
            <p>Kelola kredensial API Key global dan tentukan acuan MDR Rate dasar untuk seluruh tenant perusahaan IF Instrument.</p>
          </div>
          <div class="hero-summary-stats">
            <div class="summary-stat-card">
              <span class="stat-label">Xendit Global</span>
              <span class="stat-value" id="stat-xendit-status">Active</span>
            </div>
            <div class="summary-stat-card">
              <span class="stat-label">Midtrans Global</span>
              <span class="stat-value" id="stat-midtrans-status">Active</span>
            </div>
          </div>
        </div>

        <form id="central-master-gateway-form" class="gateway-master-form-layout">
          <div class="gateway-provider-grid">
            <!-- Xendit Card -->
            <article class="gateway-card xendit-theme">
              <div class="gateway-card-header">
                <div class="provider-identity">
                  <span class="provider-badge xendit-badge">Xendit</span>
                  <div>
                    <h4>Gateway Xendit (Pusat)</h4>
                    <p>Integrasi langsung dengan Xendit Account Master</p>
                  </div>
                </div>
                <label class="toggle-switch">
                  <input id="central-xendit-status" type="checkbox" checked />
                  <span class="toggle-slider"></span>
                  <span class="toggle-label" id="xendit-status-text">Aktif</span>
                </label>
              </div>

              <div class="gateway-card-body">
                <label class="form-field full-row">
                  <span class="field-label">Xendit Central Secret Key</span>
                  <span class="inline-input-action">
                    <input id="central-xendit-secret" autocomplete="off" type="password" placeholder="xnd_secret_key_..." />
                    <button class="ghost-button compact-button" data-toggle-secret="central-xendit-secret" type="button">View</button>
                  </span>
                  <small class="field-hint">Kredensial rahasia Xendit dari Dashboard Xendit Pusat.</small>
                </label>

                <div class="rates-input-grid">
                  <label class="form-field">
                    <span class="field-label">MDR QRIS (%)</span>
                    <input id="central-xendit-qris-rate" min="0" max="100" step="0.01" type="number" value="0.7" />
                  </label>
                  <label class="form-field">
                    <span class="field-label">MDR Card (%)</span>
                    <input id="central-xendit-card-rate" min="0" max="100" step="0.01" type="number" value="2.0" />
                  </label>
                  <label class="form-field">
                    <span class="field-label">VA Fee Flat (Rp)</span>
                    <input id="central-xendit-va-fee" min="0" step="100" type="number" value="4500" />
                  </label>
                  <label class="form-field">
                    <span class="field-label">MDR E-Wallet (%)</span>
                    <input id="central-xendit-ewallet-rate" min="0" max="100" step="0.01" type="number" value="1.5" />
                  </label>
                </div>
              </div>
            </article>

            <!-- Midtrans Card -->
            <article class="gateway-card midtrans-theme">
              <div class="gateway-card-header">
                <div class="provider-identity">
                  <span class="provider-badge midtrans-badge">Midtrans</span>
                  <div>
                    <h4>Gateway Midtrans (Pusat)</h4>
                    <p>Integrasi langsung dengan Midtrans Account Master</p>
                  </div>
                </div>
                <label class="toggle-switch">
                  <input id="central-midtrans-status" type="checkbox" checked />
                  <span class="toggle-slider"></span>
                  <span class="toggle-label" id="midtrans-status-text">Aktif</span>
                </label>
              </div>

              <div class="gateway-card-body">
                <label class="form-field full-row">
                  <span class="field-label">Midtrans Central Server Key</span>
                  <span class="inline-input-action">
                    <input id="central-midtrans-server-key" autocomplete="off" type="password" placeholder="SB-Mid-server-..." />
                    <button class="ghost-button compact-button" data-toggle-secret="central-midtrans-server-key" type="button">View</button>
                  </span>
                  <small class="field-hint">Kredensial Server Key dari MAP Dashboard Midtrans Pusat.</small>
                </label>

                <div class="rates-input-grid">
                  <label class="form-field">
                    <span class="field-label">MDR QRIS (%)</span>
                    <input id="central-midtrans-qris-rate" min="0" max="100" step="0.01" type="number" value="0.7" />
                  </label>
                  <label class="form-field">
                    <span class="field-label">MDR Card (%)</span>
                    <input id="central-midtrans-card-rate" min="0" max="100" step="0.01" type="number" value="1.9" />
                  </label>
                  <label class="form-field">
                    <span class="field-label">VA Fee Flat (Rp)</span>
                    <input id="central-midtrans-va-fee" min="0" step="100" type="number" value="4000" />
                  </label>
                  <label class="form-field">
                    <span class="field-label">MDR E-Wallet (%)</span>
                    <input id="central-midtrans-ewallet-rate" min="0" max="100" step="0.01" type="number" value="1.7" />
                  </label>
                </div>
              </div>
            </article>
          </div>

          <div class="gateway-submit-bar">
            <button class="primary-button submit-btn-large" type="submit">💾 Simpan Master Payment Gateway</button>
            <p class="form-feedback" id="central-master-gateway-feedback"></p>
          </div>
        </form>
      </section>
    </template>
    <script type="module" src="../scripts/pages/central-payment-gateway.js?v=1784794256"></script>
  </body>
</html>
