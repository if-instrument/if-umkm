<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overview Stok Outlet - IFresso Coffee</title>
    <link rel="stylesheet" href="../styles.css?v=light-v3" />
    <link rel="stylesheet" href="../styles/pages/inventory.css?v=light-v3" />
  </head>
  <body data-page="inventory-dashboard" data-title="Overview Stok Outlet" data-eyebrow="Gudang">
    <template id="page-content">
      <section class="content-grid single">
        <div class="hero-summary-banner">
          <div class="hero-summary-copy">
            <span class="hero-kicker">Stock Control Tower</span>
            <h2>Overview Stok Outlet</h2>
            <p>Ringkasan stok fisik outlet dalam satu layar. Pantau nilai persediaan bahan baku dan cegah risiko kehabisan stok operasional.</p>
          </div>
          <div class="hero-summary-stats">
            <a class="primary-button" data-app-link="/pages/inventory-list.html" href="/pages/inventory-list.html">Kelola Stok Bahan</a>
            <a class="ghost-button" style="color:white; border-color:rgba(255,255,255,0.3);" data-app-link="/pages/finished-products.html" href="/pages/finished-products.html">Stok Produk</a>
          </div>
        </div>

        <div class="metric-grid">
          <article class="metric">
            <span>Nilai Stok</span>
            <strong id="inventory-value">Rp0</strong>
            <small>Modal bahan outlet saat ini</small>
          </article>
          <article class="metric">
            <span>Bahan Outlet</span>
            <strong id="ingredient-count">0</strong>
            <small>Stok fisik aktif</small>
          </article>
          <article class="metric alert">
            <span>Stok Kritis</span>
            <strong id="critical-count">0</strong>
            <small>Di bawah batas aman</small>
          </article>
          <article class="metric">
            <span>Estimasi Reorder</span>
            <strong id="reorder-value">Rp0</strong>
            <small>Untuk kembali ke stok aman</small>
          </article>
        </div>

        <div class="workspace-panel preorder-fulfillment-panel" id="preorder-fulfillment-panel" hidden>
          <div class="panel-heading">
            <h3>Preorder (PO) Menunggu Pemenuhan</h3>
            <p>Daftar pesanan PO pelanggan yang membutuhkan pemenuhan bahan atau penyediaan stok oleh tim gudang.</p>
          </div>
          <div class="table-responsive" style="margin-top: 15px;">
            <table class="inventory-table">
              <thead>
                <tr>
                  <th>Nomor Nota</th>
                  <th>Waktu Pesanan</th>
                  <th>Tipe Layanan</th>
                  <th>Pelanggan</th>
                  <th>Detail Produk PO</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="preorder-fulfillment-list">
              </tbody>
            </table>
          </div>
        </div>

        <div class="content-grid">
          <div class="workspace-panel">
            <div class="panel-heading">
              <h3>Rekomendasi Pembelian</h3>
              <p>Bahan outlet prioritas untuk dibeli.</p>
            </div>
            <div class="recommendation-list" id="inventory-reorder-list"></div>
          </div>

          <div class="workspace-panel">
            <div class="panel-heading">
              <h3>Kesehatan Stok</h3>
              <p>Komposisi status bahan outlet.</p>
            </div>
            <div class="stock-health-list" id="stock-health-list"></div>
          </div>
        </div>

        <div class="content-grid">
          <div class="workspace-panel">
            <div class="panel-heading">
              <h3>Bahan Akan Expired</h3>
              <p>Lot bahan outlet dengan expired date terdekat.</p>
            </div>
            <div class="recommendation-list" id="ingredient-expiry-list"></div>
          </div>

          <div class="workspace-panel">
            <div class="panel-heading">
              <h3>Produk Akan Expired</h3>
              <p>Batch produk jadi atau barang dagang yang perlu diprioritaskan FEFO.</p>
            </div>
            <div class="recommendation-list" id="finished-expiry-list"></div>
          </div>
        </div>
      </section>
    </template>

    <script type="module" src="../scripts/pages/inventory.js?v=light-v3"></script>
  </body>
</html>
