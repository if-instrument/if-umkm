<VirtualHost *:80>
    ServerName if.valista.co.id
    Redirect permanent / https://if.valista.co.id/
</VirtualHost>

<VirtualHost *:443>
    ServerName if.valista.co.id

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/if.valista.co.id/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/if.valista.co.id/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / http://127.0.0.1:8081/
    ProxyPassReverse / http://127.0.0.1:8081/

    ErrorLog ${APACHE_LOG_DIR}/if-instrument-proxy-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/if-instrument-proxy-ssl-access.log combined
</VirtualHost>
